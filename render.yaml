services:
  - type: web
    name: coinbase-clone-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        scope: build
      - key: JWT_SECRET
        scope: build
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        scope: build
